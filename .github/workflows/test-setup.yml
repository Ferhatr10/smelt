name: 'Test Setup Action'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Smelt Setup Action
        uses: ./packages/setup
        with:
          sdk-version: '2.7.0'

      - name: Verify Daml Installation & Debug
        if: always()
        run: |
          echo "--- Listing files in temp directory to debug PATH ---"
          ls -R ${{ runner.temp }}
          echo "--- Attempting to run daml ---"
          daml --version
          daml --version | grep '2.7.0'
